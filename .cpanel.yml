---
# cPanel Git Version Control deployment configuration for VibeKB
# Destination: /home/iainmcok/public_html/vibekb/
#
# Review and update this file whenever the repository structure, build output,
# runtime folders, or deployment requirements change. See AGENTS.md.
#
# Note: rsync of ./ includes the hidden .vibekb/ content directory required by
# the guide app to render the living software model. Do not add
# --exclude='.vibekb/'.
# Runtime paths that must deploy: index.php, assets/ (home.css), guide/ (the V1
# app, incl. guide/assets/ and guide/templates/partials/), .vibekb/ (incl.
# diagrams/assets SVGs and diagrams/topology JSON), README.md.
# Authoring docs (PRODUCT.md, CLAUDE.md, AGENTS.md, SCHEMA.md, MAINTENANCE.md,
# INITIALIZE.md, BUILD_REPORT.md, DEPLOYMENT.md) are excluded — not needed at
# runtime.
# Excluded from cPanel (dynamic Mode A only): tools/ (the static generator,
# validator, the vibekb self-maintenance CLI, and tools/lib/ incl. Starter.php are
# build/CI/installer tooling), prompts/ (authoring), examples/ (bundled example
# models — not the active app), .cursor/ (agent rules), and docs/ (the static Mode
# B snapshot is published via GitHub Pages, not this PHP host). Also excluded:
# install.php and template/ (the installer and its payload definition are adoption
# tooling, not runtime), and INSTALLER.md (authoring doc). The Go developer CLI is
# excluded too: cmd/, internal/, go.mod, go.sum are the `vibekb` binary's source (a
# separately distributed dev tool, never served), and ARCHITECTURE.md is authoring
# doc. Only the active .vibekb/ is the runtime model.

deployment:
  tasks:
    - export DEPLOYPATH=/home/iainmcok/public_html/vibekb/
    - /bin/mkdir -p "$DEPLOYPATH"
    - /bin/rsync -av --delete --exclude='.git/' --exclude='.github/' --exclude='.cursor/' --exclude='.vscode/' --exclude='.idea/' --exclude='.cpanel.yml' --exclude='.env' --exclude='.env.*' --exclude='node_modules/' --exclude='vendor/' --exclude='tests/' --exclude='test/' --exclude='__tests__/' --exclude='docs/' --exclude='coverage/' --exclude='logs/' --exclude='tmp/' --exclude='temp/' --exclude='*.log' --exclude='.DS_Store' --exclude='Thumbs.db' --exclude='.gitignore' --exclude='.gitattributes' --exclude='.editorconfig' --exclude='.eslint*' --exclude='.prettier*' --exclude='.npmrc' --exclude='.nvmrc' --exclude='.phpunit*' --exclude='phpunit.xml*' --exclude='composer.json' --exclude='composer.lock' --exclude='package.json' --exclude='package-lock.json' --exclude='yarn.lock' --exclude='pnpm-lock.yaml' --exclude='tsconfig*.json' --exclude='vite.config.*' --exclude='webpack.config.*' --exclude='rollup.config.*' --exclude='jest.config.*' --exclude='Dockerfile*' --exclude='docker-compose*.yml' --exclude='docker-compose*.yaml' --exclude='Makefile' --exclude='tools/' --exclude='prompts/' --exclude='examples/' --exclude='install.php' --exclude='template/' --exclude='cmd/' --exclude='internal/' --exclude='go.mod' --exclude='go.sum' --exclude='AGENTS.md' --exclude='DEPLOYMENT.md' --exclude='CONTRIBUTING.md' --exclude='CLAUDE.md' --exclude='PRODUCT.md' --exclude='SCHEMA.md' --exclude='MAINTENANCE.md' --exclude='INITIALIZE.md' --exclude='INSTALLER.md' --exclude='ARCHITECTURE.md' --exclude='BUILD_REPORT.md' --exclude='.well-known/' --exclude='uploads/' --exclude='upload/' --exclude='media/' --exclude='files/' --exclude='storage/' --exclude='sessions/' --exclude='session/' --exclude='cache/' --exclude='data/' --exclude='database/' --exclude='databases/' --exclude='sqlite/' --exclude='*.sqlite' --exclude='*.sqlite3' --exclude='*.db' --exclude='config.local.php' --exclude='config.production.php' --exclude='local.config.php' --exclude='wp-config.php' --exclude='*.bak' --exclude='*.swp' --exclude='*~' ./ "$DEPLOYPATH"
