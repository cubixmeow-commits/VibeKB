name: Release vibekb CLI

# Builds cross-platform vibekb binaries when a version tag is pushed
# (e.g. v0.2.0) and publishes them to a GitHub Release with checksums
# and auto-generated release notes.
#
# Asset names MUST stay in lockstep with install.sh:
#   ASSET="${BIN_NAME}-${GOOS}-${GOARCH}"   # unix (no suffix)
# Windows assets keep a .exe suffix for manual download (install.sh is
# macOS/Linux only).

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout tagged commit
        uses: actions/checkout@v4
        with:
          # Full history for drift checks; the push-tag ref is the tagged commit.
          fetch-depth: 0
          ref: ${{ github.ref }}

      - name: Confirm checkout is the pushed tag
        run: |
          set -euo pipefail
          TAG="${GITHUB_REF_NAME}"
          exact="$(git describe --tags --exact-match HEAD 2>/dev/null || true)"
          if [ "$exact" != "$TAG" ]; then
            echo "HEAD is not exactly tag ${TAG} (describe=${exact:-none})"
            git log -1 --oneline
            exit 1
          fi
          echo "Building from tag ${TAG} at $(git rev-parse HEAD)"

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Set up PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'
          extensions: dom, mbstring
          coverage: none

      # ---- complete test suite (same gates as .github/workflows/vibekb.yml) ----

      - name: gofmt
        run: |
          set -euo pipefail
          unformatted="$(gofmt -l cmd internal embed.go)"
          if [ -n "$unformatted" ]; then
            echo "These files need gofmt:"; echo "$unformatted"; exit 1
          fi

      - name: Go vet
        run: go vet ./...

      - name: Go test
        run: go test ./...

      - name: PHP syntax check (guide + tools)
        run: find guide tools -name '*.php' -print0 | xargs -0 -n1 -P4 php -l

      - name: Validate the active model
        run: php tools/validate.php

      - name: Validate bundled example models
        run: |
          set -euo pipefail
          for m in examples/*/.vibekb; do
            if [ -d "$m" ]; then echo "== $m =="; php tools/validate.php "$m"; fi
          done

      - name: Explainable-diagram topology test
        run: php tools/test-topology.php

      - name: Consistency check (validation + drift + /docs sync)
        run: php tools/vibekb.php check --strict

      - name: Derive version metadata
        id: meta
        run: |
          set -euo pipefail
          TAG="${GITHUB_REF_NAME}"
          VERSION="${TAG#v}"
          COMMIT="$(git rev-parse --short HEAD)"
          FULL_COMMIT="$(git rev-parse HEAD)"
          BUILT="$(date -u +%Y-%m-%d)"
          {
            echo "tag=${TAG}"
            echo "version=${VERSION}"
            echo "commit=${COMMIT}"
            echo "full_commit=${FULL_COMMIT}"
            echo "built=${BUILT}"
          } >> "$GITHUB_OUTPUT"
          echo "Releasing vibekb ${VERSION} (commit ${COMMIT} / ${FULL_COMMIT}, built ${BUILT})"

      - name: Cross-compile release binaries
        env:
          VERSION: ${{ steps.meta.outputs.version }}
          COMMIT: ${{ steps.meta.outputs.commit }}
          BUILT: ${{ steps.meta.outputs.built }}
        run: |
          set -euo pipefail
          mkdir -p dist
          PKG=github.com/cubixmeow-commits/vibekb/internal/buildinfo
          LDFLAGS="-s -w -X ${PKG}.Version=${VERSION} -X ${PKG}.Commit=${COMMIT} -X ${PKG}.Built=${BUILT}"

          build() {
            local goos="$1" goarch="$2" out="$3"
            echo "→ ${out} (${goos}/${goarch})"
            CGO_ENABLED=0 GOOS="$goos" GOARCH="$goarch" \
              go build -trimpath -ldflags "${LDFLAGS}" \
              -o "dist/${out}" ./cmd/vibekb
            # Reject empty/truncated outputs before we ever publish.
            local size
            size="$(wc -c < "dist/${out}" | tr -d ' ')"
            if [ "${size:-0}" -lt 1000 ]; then
              echo "Refusing tiny binary dist/${out} (${size} bytes)" >&2
              exit 1
            fi
          }

          # Unix names match install.sh: vibekb-${GOOS}-${GOARCH}
          build darwin  arm64 vibekb-darwin-arm64
          build darwin  amd64 vibekb-darwin-amd64
          build linux   amd64 vibekb-linux-amd64
          build linux   arm64 vibekb-linux-arm64
          # Windows is supported as a manual download (.exe); install.sh is unix-only.
          build windows amd64 vibekb-windows-amd64.exe
          build windows arm64 vibekb-windows-arm64.exe

          ls -la dist

      - name: Verify release assets match install.sh contract
        run: |
          set -euo pipefail
          # Exact filenames install.sh downloads on macOS/Linux:
          #   ASSET="vibekb-${GOOS}-${GOARCH}"
          # plus Windows manuals and checksums.txt.
          expected=(
            vibekb-darwin-arm64
            vibekb-darwin-amd64
            vibekb-linux-amd64
            vibekb-linux-arm64
            vibekb-windows-amd64.exe
            vibekb-windows-arm64.exe
          )
          missing=0
          for f in "${expected[@]}"; do
            if [ ! -f "dist/${f}" ]; then
              echo "MISSING required asset: dist/${f}" >&2
              missing=1
            fi
          done
          if [ "$missing" -ne 0 ]; then
            echo "dist/ contents:" >&2
            ls -la dist >&2
            exit 1
          fi
          echo "All required assets present (install.sh unix set + Windows manuals)."

      - name: Generate SHA256 checksums
        working-directory: dist
        run: |
          set -euo pipefail
          # Explicit file list (never glob checksums.txt into itself). Sorted by
          # filename so checksums.txt is stable across runs/filesystems.
          {
            sha256sum \
              vibekb-darwin-amd64 \
              vibekb-darwin-arm64 \
              vibekb-linux-amd64 \
              vibekb-linux-arm64 \
              vibekb-windows-amd64.exe \
              vibekb-windows-arm64.exe
          } | sort -k2 > checksums.txt
          echo "--- checksums.txt ---"
          cat checksums.txt
          # Every expected binary must appear exactly once.
          for f in \
            vibekb-darwin-amd64 \
            vibekb-darwin-arm64 \
            vibekb-linux-amd64 \
            vibekb-linux-arm64 \
            vibekb-windows-amd64.exe \
            vibekb-windows-arm64.exe
          do
            n="$(grep -c " ${f}\$" checksums.txt || true)"
            if [ "$n" != "1" ]; then
              echo "checksums.txt must list ${f} exactly once (found ${n})" >&2
              exit 1
            fi
          done

      - name: Verify injected version (linux amd64 smoke)
        run: |
          set -euo pipefail
          out="$(./dist/vibekb-linux-amd64 version)"
          echo "$out"
          echo "$out" | grep -F "Version: ${{ steps.meta.outputs.version }}"
          echo "$out" | grep -F "Commit: ${{ steps.meta.outputs.commit }}"
          echo "$out" | grep -F "Built: ${{ steps.meta.outputs.built }}"
          echo "$out" | grep -F "Platform: linux/amd64"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.meta.outputs.tag }}
          name: VibeKB ${{ steps.meta.outputs.version }}
          draft: false
          prerelease: false
          # Fail closed: do not publish if any listed path is missing.
          fail_on_unmatched_files: true
          generate_release_notes: true
          body: |
            Download the binary for your platform, make it executable if needed, put it on your `PATH` as `vibekb`, then run:

            ```bash
            vibekb install /path/to/your/project
            ```

            **Primary install (macOS / Linux):**

            ```bash
            curl -fsSL https://iainreid.dev/vibekb/install.sh | sh
            ```

            The website installer downloads one of:
            `vibekb-darwin-arm64`, `vibekb-darwin-amd64`, `vibekb-linux-amd64`, `vibekb-linux-arm64`.

            Installation does **not** require Go. PHP 8.2+ is required afterward to run the guide and model commands (`vibekb check`, `vibekb generate`, the dynamic guide).

            | Artifact | Platform |
            | --- | --- |
            | `vibekb-darwin-arm64` | macOS Apple Silicon |
            | `vibekb-darwin-amd64` | macOS Intel |
            | `vibekb-linux-amd64` | Linux (x86_64) |
            | `vibekb-linux-arm64` | Linux (ARM64) |
            | `vibekb-windows-amd64.exe` | Windows (x86_64) — manual download |
            | `vibekb-windows-arm64.exe` | Windows (ARM64) — manual download |
            | `checksums.txt` | SHA256 of every binary |

            **Build:** commit `${{ steps.meta.outputs.commit }}` (`${{ steps.meta.outputs.full_commit }}`) · date `${{ steps.meta.outputs.built }}` UTC

            **Not yet included:** code signing / Apple notarization / Windows Authenticode, Homebrew, or Winget.
          files: |
            dist/vibekb-darwin-arm64
            dist/vibekb-darwin-amd64
            dist/vibekb-linux-amd64
            dist/vibekb-linux-arm64
            dist/vibekb-windows-amd64.exe
            dist/vibekb-windows-arm64.exe
            dist/checksums.txt
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
