<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink" viewBox="0 0 760 400" role="img" aria-labelledby="cl-title cl-desc">
  <title id="cl-title">How the model is loaded and validated</title>
  <desc id="cl-desc">An entry point delegates loading to the loader, which reads and parses the content files, creates the in-memory model, and calls validation. Validation emits its issue list to the Reference view and CI. The path is one-way and read-only. Each node and edge links to its written explanation below; every edge is verified from source and drawn with a solid line.</desc>
  <defs>
    <marker id="cl-arrow" markerWidth="9" markerHeight="9" refX="7" refY="4" orient="auto">
      <path d="M0,0 L8,4 L0,8 z" fill="#4f5c56"/>
    </marker>
    <style>
      .t { font-family:"Figtree","Segoe UI",sans-serif; fill:#1a2421; }
      .box { stroke:#b9c6c0; stroke-width:1.5; fill:#e7f4f0; }
      .src { fill:#fffcf7; stroke:#b9c6c0; stroke-width:1.5; }
      .chk { fill:#f6ead4; stroke:#7a4210; stroke-width:1.5; }
      .lbl { font-size:13px; font-weight:600; }
      .sm { font-size:11px; fill:#4f5c56; }
      .arrow { stroke:#4f5c56; stroke-width:1.6; fill:none; marker-end:url(#cl-arrow); }
      .hit { stroke:transparent; stroke-width:16; fill:none; }
      .title { font-size:20px; font-weight:800; font-family:"Outfit","Figtree",sans-serif; }
    </style>
  </defs>
  <rect width="760" height="400" fill="#f4f0e8"/>
  <text class="t title" x="28" y="36">Loading the model</text>
  <text class="t sm" x="28" y="56">One-way, read-only. Solid = verified from source. Select any box or arrow for its explanation.</text>

  <a href="#node-content-files" xlink:href="#node-content-files" class="dnode" data-vibekb-node="content-files">
    <title>Content files (.vibekb/) — open explanation</title>
    <rect class="t src" x="250" y="80" width="150" height="60" rx="9"/>
    <text class="t lbl" x="325" y="106" text-anchor="middle">Content files</text>
    <text class="t sm" x="325" y="124" text-anchor="middle">.vibekb/ *.md · *.json</text>
  </a>

  <a href="#node-entry-point" xlink:href="#node-entry-point" class="dnode" data-vibekb-node="entry-point">
    <title>Entry point — open explanation</title>
    <rect class="t box" x="30" y="190" width="150" height="60" rx="9"/>
    <text class="t lbl" x="105" y="216" text-anchor="middle">Entry point</text>
    <text class="t sm" x="105" y="234" text-anchor="middle">guide / tool</text>
  </a>

  <a href="#node-loader" xlink:href="#node-loader" class="dnode" data-vibekb-node="loader">
    <title>Loader (Content::load) — open explanation</title>
    <rect class="t box" x="250" y="190" width="150" height="60" rx="9"/>
    <text class="t lbl" x="325" y="216" text-anchor="middle">Loader</text>
    <text class="t sm" x="325" y="234" text-anchor="middle">Content::load()</text>
  </a>

  <a href="#node-model" xlink:href="#node-model" class="dnode" data-vibekb-node="model">
    <title>In-memory model — open explanation</title>
    <rect class="t box" x="470" y="190" width="160" height="60" rx="9"/>
    <text class="t lbl" x="550" y="216" text-anchor="middle">In-memory model</text>
    <text class="t sm" x="550" y="234" text-anchor="middle">resolved &amp; keyed</text>
  </a>

  <a href="#node-validation" xlink:href="#node-validation" class="dnode" data-vibekb-node="validation">
    <title>Validation (validate()) — open explanation</title>
    <rect class="t chk" x="250" y="300" width="150" height="60" rx="9"/>
    <text class="t lbl" x="325" y="326" text-anchor="middle">Validation</text>
    <text class="t sm" x="325" y="344" text-anchor="middle">validate()</text>
  </a>

  <a href="#node-reference-view" xlink:href="#node-reference-view" class="dnode" data-vibekb-node="reference-view">
    <title>Reference view &amp; CI — open explanation</title>
    <rect class="t box" x="470" y="300" width="160" height="60" rx="9"/>
    <text class="t lbl" x="550" y="326" text-anchor="middle">Reference &amp; CI</text>
    <text class="t sm" x="550" y="344" text-anchor="middle">issues surface here</text>
  </a>

  <a href="#edge-entry-point-delegates-loader" xlink:href="#edge-entry-point-delegates-loader" class="dedge" data-vibekb-edge="entry-point-delegates-loader">
    <title>delegates loading to — verified</title>
    <line class="hit" x1="180" y1="220" x2="248" y2="220"/>
    <line class="arrow" x1="180" y1="220" x2="248" y2="220"/>
  </a>
  <a href="#edge-loader-reads-content-files" xlink:href="#edge-loader-reads-content-files" class="dedge" data-vibekb-edge="loader-reads-content-files">
    <title>reads &amp; parses — verified</title>
    <line class="hit" x1="325" y1="190" x2="325" y2="142"/>
    <line class="arrow" x1="325" y1="190" x2="325" y2="142"/>
  </a>
  <a href="#edge-loader-creates-model" xlink:href="#edge-loader-creates-model" class="dedge" data-vibekb-edge="loader-creates-model">
    <title>creates — verified</title>
    <line class="hit" x1="400" y1="220" x2="468" y2="220"/>
    <line class="arrow" x1="400" y1="220" x2="468" y2="220"/>
  </a>
  <a href="#edge-loader-calls-validation" xlink:href="#edge-loader-calls-validation" class="dedge" data-vibekb-edge="loader-calls-validation">
    <title>calls — verified</title>
    <line class="hit" x1="325" y1="250" x2="325" y2="298"/>
    <line class="arrow" x1="325" y1="250" x2="325" y2="298"/>
  </a>
  <a href="#edge-validation-emits-reference" xlink:href="#edge-validation-emits-reference" class="dedge" data-vibekb-edge="validation-emits-reference">
    <title>emits issues to — verified</title>
    <line class="hit" x1="400" y1="330" x2="468" y2="330"/>
    <line class="arrow" x1="400" y1="330" x2="468" y2="330"/>
  </a>

  <text class="t sm" x="28" y="388">The guide, the generator, and the validator all run this one pipeline — so local validation and CI cannot diverge.</text>
</svg>
