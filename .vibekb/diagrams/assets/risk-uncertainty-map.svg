<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 440" role="img" aria-labelledby="ru-title ru-desc">
  <title id="ru-title">Risk and uncertainty map</title>
  <desc id="ru-desc">Where to be careful in the SousMeow model. Active warnings: pasted responses are untrusted and must stay escaped; Pantry and Artifact read and write paths are coupled; password reset silently no-ops without SMTP; the legacy category column must never be read. Areas still only inferred from source: manage-account, seed-and-sync-content, and bulk demo simulation.</desc>
  <defs>
    <style>
      .t { font-family:"Figtree","Segoe UI",sans-serif; fill:#1a2421; }
      .warn { fill:#f6ead4; stroke:#7a4210; stroke-width:1.5; }
      .danger { fill:#f6dede; stroke:#9e2424; stroke-width:1.5; }
      .inferred { fill:#e4e8e3; stroke:#4f5c56; stroke-width:1.4; stroke-dasharray:6 4; }
      .lbl { font-size:13px; font-weight:700; }
      .sm { font-size:11px; fill:#4f5c56; }
      .hd { font-size:13px; font-weight:700; fill:#4f5c56; text-transform:uppercase; letter-spacing:0.05em; }
      .title { font-size:20px; font-weight:800; font-family:"Outfit","Figtree",sans-serif; }
    </style>
  </defs>
  <rect width="900" height="440" fill="#f4f0e8"/>
  <text class="t title" x="28" y="38">Risk &amp; uncertainty map</text>
  <text class="t sm" x="28" y="60">Read this before changing SousMeow behaviour. A living map — update it when risks change.</text>

  <text class="t hd" x="30" y="92">Active warnings</text>
  <rect class="t danger" x="30" y="104" width="250" height="58" rx="9"/>
  <text class="t lbl" x="45" y="128" fill="#9e2424">Pasted response is untrusted</text>
  <text class="t sm" x="45" y="146" fill="#9e2424">Keep escaped everywhere, incl. kit.html</text>

  <rect class="t warn" x="300" y="104" width="250" height="58" rx="9"/>
  <text class="t lbl" x="315" y="128" fill="#7a4210">Read/write path coupling</text>
  <text class="t sm" x="315" y="146" fill="#7a4210">Change Pantry/Artifact paths together</text>

  <rect class="t warn" x="570" y="104" width="300" height="58" rx="9"/>
  <text class="t lbl" x="585" y="128" fill="#7a4210">Password reset depends on SMTP</text>
  <text class="t sm" x="585" y="146" fill="#7a4210">Web reset silently no-ops without SMTP</text>

  <rect class="t danger" x="30" y="176" width="250" height="52" rx="9"/>
  <text class="t lbl" x="45" y="198" fill="#9e2424">Legacy category column</text>
  <text class="t sm" x="45" y="216" fill="#9e2424">Never read cookbooks.category</text>

  <text class="t hd" x="30" y="272">Inferred from source (not line-traced)</text>
  <rect class="t inferred" x="30" y="284" width="260" height="54" rx="9"/>
  <text class="t lbl" x="45" y="306">manage-account</text>
  <text class="t sm" x="45" y="324">AccountController not traced line by line</text>

  <rect class="t inferred" x="310" y="284" width="260" height="54" rx="9"/>
  <text class="t lbl" x="325" y="306">seed-and-sync-content</text>
  <text class="t sm" x="325" y="324">scripts/seed.php not line-traced</text>

  <rect class="t inferred" x="590" y="284" width="280" height="54" rx="9"/>
  <text class="t lbl" x="605" y="306">demo-simulation (bulk)</text>
  <text class="t sm" x="605" y="324">paste-example verified; bulk inferred</text>

  <text class="t sm" x="28" y="400">Legend: red = defect risk if mishandled · amber = configuration/deployment risk · grey dashed = unverified, trace before trusting.</text>
</svg>
