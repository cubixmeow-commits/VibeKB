<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 340" role="img" aria-labelledby="sm-title sm-desc">
  <title id="sm-title">The self-maintenance lifecycle</title>
  <desc id="sm-desc">A left-to-right loop with eight steps: start with vibekb status; understand the affected functionality and risks; record the work in current.md; implement the code change; find affected records with vibekb affected; update the model (records, memory, diagrams, provenance); run vibekb check and regenerate the docs snapshot; write the handoff the next session reads. An arrow loops from the handoff back to the start, showing the cycle continues across sessions. Two steps are marked as command touch points: status at the start and check/affected during the change.</desc>
  <defs>
    <marker id="sm-arrow" markerWidth="9" markerHeight="9" refX="7" refY="4" orient="auto">
      <path d="M0,0 L8,4 L0,8 z" fill="#4f5c56"/>
    </marker>
    <style>
      .t { font-family:"Figtree","Segoe UI",sans-serif; fill:#1a2421; }
      .box { stroke:#b9c6c0; stroke-width:1.5; fill:#e7f4f0; }
      .cmd { fill:#f6ead4; stroke:#7a4210; stroke-width:1.5; }
      .lbl { font-size:12px; font-weight:600; }
      .sm { font-size:10.5px; fill:#4f5c56; }
      .arrow { stroke:#4f5c56; stroke-width:1.6; fill:none; marker-end:url(#sm-arrow); }
      .loop { stroke:#7a4210; stroke-width:1.6; fill:none; stroke-dasharray:6 4; marker-end:url(#sm-arrow); }
      .title { font-size:20px; font-weight:800; font-family:"Outfit","Figtree",sans-serif; }
    </style>
  </defs>
  <rect width="900" height="340" fill="#f4f0e8"/>
  <text class="t title" x="28" y="38">Self-maintenance lifecycle</text>
  <text class="t sm" x="28" y="58">Amber steps are CLI touch points. The dashed arrow shows the loop continues across sessions.</text>

  <g>
    <rect class="t cmd" x="30" y="90" width="130" height="58" rx="9"/>
    <text class="t lbl" x="95" y="114" text-anchor="middle">1 · status</text>
    <text class="t sm" x="95" y="132" text-anchor="middle">vibekb status</text>
  </g>
  <g>
    <rect class="t box" x="190" y="90" width="130" height="58" rx="9"/>
    <text class="t lbl" x="255" y="114" text-anchor="middle">2 · Understand</text>
    <text class="t sm" x="255" y="132" text-anchor="middle">affected + risks</text>
  </g>
  <g>
    <rect class="t box" x="350" y="90" width="130" height="58" rx="9"/>
    <text class="t lbl" x="415" y="114" text-anchor="middle">3 · Record work</text>
    <text class="t sm" x="415" y="132" text-anchor="middle">current.md</text>
  </g>
  <g>
    <rect class="t box" x="510" y="90" width="130" height="58" rx="9"/>
    <text class="t lbl" x="575" y="114" text-anchor="middle">4 · Implement</text>
    <text class="t sm" x="575" y="132" text-anchor="middle">change the code</text>
  </g>
  <g>
    <rect class="t cmd" x="670" y="90" width="150" height="58" rx="9"/>
    <text class="t lbl" x="745" y="114" text-anchor="middle">5 · affected</text>
    <text class="t sm" x="745" y="132" text-anchor="middle">files → functionality</text>
  </g>

  <g>
    <rect class="t box" x="670" y="210" width="150" height="58" rx="9"/>
    <text class="t lbl" x="745" y="234" text-anchor="middle">6 · Update model</text>
    <text class="t sm" x="745" y="252" text-anchor="middle">records · memory · diagrams</text>
  </g>
  <g>
    <rect class="t cmd" x="490" y="210" width="150" height="58" rx="9"/>
    <text class="t lbl" x="565" y="234" text-anchor="middle">7 · check + generate</text>
    <text class="t sm" x="565" y="252" text-anchor="middle">validate · drift · /docs</text>
  </g>
  <g>
    <rect class="t box" x="330" y="210" width="130" height="58" rx="9"/>
    <text class="t lbl" x="395" y="234" text-anchor="middle">8 · Handoff</text>
    <text class="t sm" x="395" y="252" text-anchor="middle">next action</text>
  </g>

  <line class="arrow" x1="160" y1="119" x2="188" y2="119"/>
  <line class="arrow" x1="320" y1="119" x2="348" y2="119"/>
  <line class="arrow" x1="480" y1="119" x2="508" y2="119"/>
  <line class="arrow" x1="640" y1="119" x2="668" y2="119"/>
  <path class="arrow" d="M745 148 L745 208"/>
  <line class="arrow" x1="670" y1="239" x2="642" y2="239"/>
  <line class="arrow" x1="490" y1="239" x2="462" y2="239"/>
  <path class="loop" d="M330 239 L110 239 L110 150"/>

  <text class="t sm" x="28" y="312">Start every change at step 1; never mark work done at step 4 — the model update (6) and honest handoff (8) are the change.</text>
</svg>
