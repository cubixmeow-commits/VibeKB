<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink" viewBox="0 0 900 440" role="img" aria-labelledby="va-title va-desc">
  <title id="va-title">VibeKB architecture — one source, one loader, two modes</title>
  <desc id="va-desc">The content model in .vibekb/ is the single source of truth. One loader (Content.php) reads it. The dynamic guide (Mode A) and the static generator (Mode B) both delegate loading to that loader and render the same shared templates. The maintenance CLI validates the model and checks it for drift. Each node and edge links to its written explanation below; every relationship here is verified from source and drawn with a solid line.</desc>
  <defs>
    <marker id="va-arrow" markerWidth="9" markerHeight="9" refX="7" refY="4" orient="auto">
      <path d="M0,0 L8,4 L0,8 z" fill="#4f5c56"/>
    </marker>
    <style>
      .t { font-family:"Figtree","Segoe UI",sans-serif; fill:#1a2421; }
      .box { stroke:#b9c6c0; stroke-width:1.5; fill:#e7f4f0; }
      .src { fill:#fffcf7; stroke:#b9c6c0; stroke-width:1.5; }
      .tool { fill:#e4e8e3; stroke:#4f5c56; stroke-width:1.5; }
      .lbl { font-size:13px; font-weight:600; }
      .sm { font-size:11px; fill:#4f5c56; }
      .arrow { stroke:#4f5c56; stroke-width:1.6; fill:none; marker-end:url(#va-arrow); }
      .hit { stroke:transparent; stroke-width:16; fill:none; }
      .title { font-size:20px; font-weight:800; font-family:"Outfit","Figtree",sans-serif; }
    </style>
  </defs>
  <rect width="900" height="440" fill="#f4f0e8"/>
  <text class="t title" x="28" y="38">VibeKB architecture</text>
  <text class="t sm" x="28" y="58">One source, one loader, two modes. Solid = verified from source. Select any box or arrow for its explanation.</text>

  <a href="#node-dynamic-guide" xlink:href="#node-dynamic-guide" class="dnode" data-vibekb-node="dynamic-guide">
    <title>Dynamic guide (Mode A) — open explanation</title>
    <rect class="t box" x="40" y="110" width="170" height="64" rx="9"/>
    <text class="t lbl" x="125" y="137" text-anchor="middle">Dynamic guide</text>
    <text class="t sm" x="125" y="156" text-anchor="middle">Mode A · guide/index.php</text>
  </a>

  <a href="#node-static-generator" xlink:href="#node-static-generator" class="dnode" data-vibekb-node="static-generator">
    <title>Static generator (Mode B) — open explanation</title>
    <rect class="t box" x="40" y="286" width="170" height="64" rx="9"/>
    <text class="t lbl" x="125" y="313" text-anchor="middle">Static generator</text>
    <text class="t sm" x="125" y="332" text-anchor="middle">Mode B · /docs</text>
  </a>

  <a href="#node-loader" xlink:href="#node-loader" class="dnode" data-vibekb-node="loader">
    <title>Loader (Content.php) — open explanation</title>
    <rect class="t box" x="360" y="110" width="170" height="64" rx="9"/>
    <text class="t lbl" x="445" y="137" text-anchor="middle">Loader</text>
    <text class="t sm" x="445" y="156" text-anchor="middle">Content.php</text>
  </a>

  <a href="#node-templates" xlink:href="#node-templates" class="dnode" data-vibekb-node="templates">
    <title>Shared templates — open explanation</title>
    <rect class="t box" x="360" y="286" width="170" height="64" rx="9"/>
    <text class="t lbl" x="445" y="313" text-anchor="middle">Shared templates</text>
    <text class="t sm" x="445" y="332" text-anchor="middle">guide/templates · nav.php</text>
  </a>

  <a href="#node-content-model" xlink:href="#node-content-model" class="dnode" data-vibekb-node="content-model">
    <title>Content model (.vibekb/) — open explanation</title>
    <rect class="t src" x="680" y="110" width="180" height="64" rx="9"/>
    <text class="t lbl" x="770" y="137" text-anchor="middle">Content model</text>
    <text class="t sm" x="770" y="156" text-anchor="middle">.vibekb/ (source of truth)</text>
  </a>

  <a href="#node-maintenance-cli" xlink:href="#node-maintenance-cli" class="dnode" data-vibekb-node="maintenance-cli">
    <title>Maintenance CLI (vibekb.php) — open explanation</title>
    <rect class="t tool" x="600" y="286" width="260" height="64" rx="9"/>
    <text class="t lbl" x="730" y="313" text-anchor="middle">Maintenance CLI</text>
    <text class="t sm" x="730" y="332" text-anchor="middle">tools/vibekb.php · status / check / affected</text>
  </a>

  <a href="#edge-dynamic-guide-delegates-loader" xlink:href="#edge-dynamic-guide-delegates-loader" class="dedge" data-vibekb-edge="dynamic-guide-delegates-loader">
    <title>loads the model via — verified</title>
    <line class="hit" x1="210" y1="142" x2="358" y2="142"/>
    <line class="arrow" x1="210" y1="142" x2="358" y2="142"/>
  </a>
  <a href="#edge-static-generator-renders-templates" xlink:href="#edge-static-generator-renders-templates" class="dedge" data-vibekb-edge="static-generator-renders-templates">
    <title>renders — verified</title>
    <line class="hit" x1="210" y1="318" x2="358" y2="318"/>
    <line class="arrow" x1="210" y1="318" x2="358" y2="318"/>
  </a>
  <a href="#edge-dynamic-guide-renders-templates" xlink:href="#edge-dynamic-guide-renders-templates" class="dedge" data-vibekb-edge="dynamic-guide-renders-templates">
    <title>renders — verified</title>
    <line class="hit" x1="125" y1="174" x2="360" y2="308"/>
    <line class="arrow" x1="125" y1="174" x2="360" y2="308"/>
  </a>
  <a href="#edge-static-generator-delegates-loader" xlink:href="#edge-static-generator-delegates-loader" class="dedge" data-vibekb-edge="static-generator-delegates-loader">
    <title>loads the model via — verified</title>
    <line class="hit" x1="125" y1="286" x2="360" y2="156"/>
    <line class="arrow" x1="125" y1="286" x2="360" y2="156"/>
  </a>
  <a href="#edge-loader-reads-content-model" xlink:href="#edge-loader-reads-content-model" class="dedge" data-vibekb-edge="loader-reads-content-model">
    <title>reads the model — verified</title>
    <line class="hit" x1="530" y1="142" x2="678" y2="142"/>
    <line class="arrow" x1="530" y1="142" x2="678" y2="142"/>
  </a>
  <a href="#edge-maintenance-cli-validates-content-model" xlink:href="#edge-maintenance-cli-validates-content-model" class="dedge" data-vibekb-edge="maintenance-cli-validates-content-model">
    <title>validates &amp; checks drift — verified</title>
    <path class="hit" d="M770 286 L770 176"/>
    <path class="arrow" d="M770 286 L770 176"/>
  </a>

  <text class="t sm" x="28" y="418">Both modes share one loader and one template set, so the live guide and the /docs snapshot can never disagree.</text>
</svg>
